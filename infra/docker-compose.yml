# MatchDB — Docker Compose (MERN Stack)
# Database: MongoDB Atlas (cloud-hosted) — no local DB container needed.
# This compose file builds and runs the backend services only.

services:
  shell-services:
    build:
      context: ./matchdb-shell-services
      dockerfile: Dockerfile
    container_name: matchdb_shell_services
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./matchdb-shell-services/env/.env.${NODE_ENV:-local}

  jobs-services:
    build:
      context: ./matchdb-jobs-services
      dockerfile: Dockerfile
    container_name: matchdb_jobs_services
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ./matchdb-jobs-services/env/.env.${NODE_ENV:-local}
