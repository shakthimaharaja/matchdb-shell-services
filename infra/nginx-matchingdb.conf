# MatchDB — nginx production config
# Copy to: /etc/nginx/sites-available/matchingdb
# Enable:  ln -s /etc/nginx/sites-available/matchingdb /etc/nginx/sites-enabled/
# Test:    nginx -t
# Reload:  systemctl reload nginx

# ── Upstream backends (localhost-only — NOT exposed to public) ──────────────
upstream shell_api {
    server 127.0.0.1:8000;      # API gateway + shell-services
    keepalive 32;
}

upstream jobs_api {
    server 127.0.0.1:8001;      # direct — for health checks only
    keepalive 4;
}

# ── Redirect HTTP → HTTPS ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name matchingdb.com www.matchingdb.com;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name matchingdb.com www.matchingdb.com;

    # ── SSL (issued by certbot) ───────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/matchingdb.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matchingdb.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Gzip (nginx handles compression — remove app-level if preferred) ──────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 5;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml text/javascript;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "strict-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── Shell UI — webpack dist served directly ───────────────────────────────
    root  /opt/matchdb/matchdb-shell-ui/dist;
    index index.html;

    # Hashed JS/CSS bundles — immutable cache (1 year)
    location ~* \.(js|css)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        gzip_static on;
        try_files $uri =404;
    }

    # Static assets
    location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        expires    30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── Jobs UI remote entry (Module Federation) ──────────────────────────────
    # Shell webpack built with: production URL = https://matchingdb.com/jobs-remote
    location /jobs-remote/ {
        alias /opt/matchdb/matchdb-jobs-ui/dist/;

        # remoteEntry.js must NOT be cached (MFE hot-reload in future deploys)
        location /jobs-remote/remoteEntry.js {
            alias /opt/matchdb/matchdb-jobs-ui/dist/remoteEntry.js;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            expires    -1;
        }

        # Hashed chunks — immutable
        location ~* /jobs-remote/.*\.(js|css)$ {
            add_header Cache-Control "public, immutable";
            expires    1y;
        }
    }

    # ── API — All traffic via shell-services gateway (:8000) ─────────────────
    # Shell-services acts as an API gateway. It handles /api/auth, /api/payments,
    # /api/user directly, and proxies /api/jobs to jobs-services (:8001).
    location /api/ {
        proxy_pass         http://shell_api/api/;
        proxy_http_version 1.1;
        proxy_set_header   Connection     "";
        proxy_set_header   Host           $host;
        proxy_set_header   X-Real-IP      $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # ── Health checks (load balancer / uptime monitoring) ────────────────────
    location /health/shell {
        proxy_pass http://shell_api/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    location /health/jobs {
        proxy_pass http://jobs_api/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # ── SPA fallback — React Router client-side routing ──────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
